services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: oseduc
      POSTGRES_USER: oseduc
      POSTGRES_PASSWORD: oseduc_dev_password
    ports:
      - "5432:5432"
    volumes:
      - oseduc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oseduc -d oseduc"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oseduc-postgres-data:
